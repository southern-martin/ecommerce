<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <div style="background: #4F46E5; color: white; padding: 20px; text-align: center; border-radius: 8px 8px 0 0;">
    <h1 style="margin: 0;">Welcome!</h1>
  </div>
  <div style="border: 1px solid #e5e7eb; padding: 20px; border-radius: 0 0 8px 8px;">
    <p>Hi {{.Name}},</p>
    <p>Welcome to our marketplace! Your account has been created successfully.</p>
    <div style="background: #f9fafb; padding: 15px; border-radius: 6px; margin: 15px 0;">
      <p style="margin: 5px 0;"><strong>Email:</strong> {{.Email}}</p>
    </div>
    <p>Start exploring our products and find great deals today.</p>
    <div style="text-align: center; margin: 25px 0;">
      <a href="{{.ShopURL}}" style="background: #4F46E5; color: white; padding: 12px 30px; border-radius: 6px; text-decoration: none; font-weight: bold;">Start Shopping</a>
    </div>
    <p style="color: #6b7280; font-size: 12px; margin-top: 30px;">This is an automated message from our ecommerce platform.</p>
  </div>
</body>
</html>
