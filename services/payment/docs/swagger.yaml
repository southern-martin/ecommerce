basePath: /api/v1
definitions:
  github_com_southern-martin_ecommerce_services_payment_internal_domain.OrderSellerItem:
    properties:
      amount_cents:
        type: integer
      seller_id:
        type: string
    type: object
  github_com_southern-martin_ecommerce_services_payment_internal_domain.Payment:
    properties:
      amountCents:
        format: int64
        type: integer
      buyerID:
        type: string
      createdAt:
        type: string
      currency:
        type: string
      failureReason:
        type: string
      id:
        type: string
      method:
        $ref: '#/definitions/github_com_southern-martin_ecommerce_services_payment_internal_domain.PaymentMethod'
      orderID:
        type: string
      status:
        $ref: '#/definitions/github_com_southern-martin_ecommerce_services_payment_internal_domain.PaymentStatus'
      stripePaymentID:
        type: string
      updatedAt:
        type: string
    type: object
  github_com_southern-martin_ecommerce_services_payment_internal_domain.PaymentMethod:
    enum:
    - card
    - wallet
    type: string
    x-enum-varnames:
    - PaymentMethodCard
    - PaymentMethodWallet
  github_com_southern-martin_ecommerce_services_payment_internal_domain.PaymentStatus:
    enum:
    - pending
    - completed
    - failed
    - refunded
    type: string
    x-enum-varnames:
    - PaymentStatusPending
    - PaymentStatusCompleted
    - PaymentStatusFailed
    - PaymentStatusRefunded
  github_com_southern-martin_ecommerce_services_payment_internal_domain.Payout:
    properties:
      amountCents:
        format: int64
        type: integer
      completedAt:
        type: string
      currency:
        type: string
      id:
        type: string
      method:
        description: '"stripe_connect", "bank_transfer"'
        type: string
      requestedAt:
        type: string
      sellerID:
        type: string
      status:
        $ref: '#/definitions/github_com_southern-martin_ecommerce_services_payment_internal_domain.PayoutStatus'
      stripeTransferID:
        type: string
    type: object
  github_com_southern-martin_ecommerce_services_payment_internal_domain.PayoutStatus:
    enum:
    - requested
    - processing
    - completed
    - failed
    type: string
    x-enum-varnames:
    - PayoutStatusRequested
    - PayoutStatusProcessing
    - PayoutStatusCompleted
    - PayoutStatusFailed
  github_com_southern-martin_ecommerce_services_payment_internal_domain.SellerWallet:
    properties:
      availableBalance:
        format: int64
        type: integer
      currency:
        type: string
      pendingBalance:
        format: int64
        type: integer
      sellerID:
        type: string
      updatedAt:
        type: string
    type: object
  github_com_southern-martin_ecommerce_services_payment_internal_domain.WalletTransaction:
    properties:
      amountCents:
        description: positive = credit, negative = debit
        format: int64
        type: integer
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      referenceID:
        type: string
      referenceType:
        type: string
      sellerID:
        type: string
      type:
        $ref: '#/definitions/github_com_southern-martin_ecommerce_services_payment_internal_domain.WalletTransactionType'
    type: object
  github_com_southern-martin_ecommerce_services_payment_internal_domain.WalletTransactionType:
    enum:
    - sale
    - commission_deducted
    - payout
    - refund_debit
    - adjustment
    type: string
    x-enum-varnames:
    - WalletTxSale
    - WalletTxCommissionDeducted
    - WalletTxPayout
    - WalletTxRefundDebit
    - WalletTxAdjustment
  github_com_southern-martin_ecommerce_services_payment_internal_usecase.CreatePaymentInput:
    properties:
      amount_cents:
        type: integer
      buyer_id:
        type: string
      currency:
        type: string
      method:
        $ref: '#/definitions/github_com_southern-martin_ecommerce_services_payment_internal_domain.PaymentMethod'
      order_id:
        type: string
      seller_items:
        items:
          $ref: '#/definitions/github_com_southern-martin_ecommerce_services_payment_internal_domain.OrderSellerItem'
        type: array
    required:
    - amount_cents
    - order_id
    type: object
  github_com_southern-martin_ecommerce_services_payment_internal_usecase.CreatePaymentOutput:
    properties:
      client_secret:
        type: string
      payment_id:
        type: string
      status:
        type: string
      stripe_payment_id:
        type: string
    type: object
  github_com_southern-martin_ecommerce_services_payment_internal_usecase.RequestPayoutInput:
    properties:
      amount_cents:
        type: integer
      currency:
        type: string
      method:
        type: string
      seller_id:
        type: string
    required:
    - amount_cents
    type: object
  github_com_southern-martin_ecommerce_services_payment_internal_usecase.WebhookEvent:
    properties:
      failure_reason:
        description: FailureReason is populated when the payment fails.
        type: string
      seller_items:
        description: SellerItems is included for crediting seller wallets on success.
        items:
          $ref: '#/definitions/github_com_southern-martin_ecommerce_services_payment_internal_domain.OrderSellerItem'
        type: array
      stripe_payment_id:
        type: string
      type:
        type: string
    type: object
host: localhost:28084
info:
  contact: {}
  description: Payment processing, wallet management, refunds, and seller payouts.
  title: Payment Service API
  version: "1.0"
paths:
  /payments:
    get:
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              page:
                type: integer
              page_size:
                type: integer
              payments:
                items:
                  $ref: '#/definitions/github_com_southern-martin_ecommerce_services_payment_internal_domain.Payment'
                type: array
              total:
                format: int64
                type: integer
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List payments for the authenticated buyer
      tags:
      - Payments
  /payments/{id}:
    get:
      parameters:
      - description: Payment ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_southern-martin_ecommerce_services_payment_internal_domain.Payment'
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Get a payment by ID
      tags:
      - Payments
  /payments/create-intent:
    post:
      consumes:
      - application/json
      parameters:
      - description: Payment intent payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_southern-martin_ecommerce_services_payment_internal_usecase.CreatePaymentInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_southern-martin_ecommerce_services_payment_internal_usecase.CreatePaymentOutput'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a payment intent
      tags:
      - Payments
  /payments/payouts:
    get:
      parameters:
      - description: Seller ID (fallback)
        in: query
        name: seller_id
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              page:
                type: integer
              page_size:
                type: integer
              payouts:
                items:
                  $ref: '#/definitions/github_com_southern-martin_ecommerce_services_payment_internal_domain.Payout'
                type: array
              total:
                format: int64
                type: integer
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List payouts for the authenticated seller
      tags:
      - Payments
    post:
      consumes:
      - application/json
      parameters:
      - description: Payout request payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_southern-martin_ecommerce_services_payment_internal_usecase.RequestPayoutInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_southern-martin_ecommerce_services_payment_internal_domain.Payout'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Request a seller payout
      tags:
      - Payments
  /payments/wallet:
    get:
      parameters:
      - description: Seller ID (fallback)
        in: query
        name: seller_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_southern-martin_ecommerce_services_payment_internal_domain.SellerWallet'
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get wallet balance for the authenticated seller
      tags:
      - Payments
  /payments/wallet/transactions:
    get:
      parameters:
      - description: Seller ID (fallback)
        in: query
        name: seller_id
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              page:
                type: integer
              page_size:
                type: integer
              total:
                format: int64
                type: integer
              transactions:
                items:
                  $ref: '#/definitions/github_com_southern-martin_ecommerce_services_payment_internal_domain.WalletTransaction'
                type: array
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List wallet transactions for the authenticated seller
      tags:
      - Payments
  /payments/webhooks/stripe:
    post:
      consumes:
      - application/json
      parameters:
      - description: Stripe webhook event
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_southern-martin_ecommerce_services_payment_internal_usecase.WebhookEvent'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              received:
                type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Handle Stripe webhook event
      tags:
      - Payments
securityDefinitions:
  BearerAuth:
    description: JWT Bearer token (via Kong gateway)
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
