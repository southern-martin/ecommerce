basePath: /api/v1
definitions:
  internal_adapter_http.addMessageRequest:
    properties:
      attachments:
        items:
          type: string
        type: array
      message:
        type: string
    required:
    - message
    type: object
  internal_adapter_http.approveReturnRequest:
    properties:
      refund_amount_cents:
        type: integer
    type: object
  internal_adapter_http.createDisputeRequest:
    properties:
      description:
        type: string
      order_id:
        type: string
      return_id:
        type: string
      seller_id:
        type: string
      type:
        type: string
    required:
    - description
    - order_id
    - seller_id
    - type
    type: object
  internal_adapter_http.createReturnItemRequest:
    properties:
      order_item_id:
        type: string
      product_id:
        type: string
      quantity:
        type: integer
      reason:
        type: string
      variant_id:
        type: string
    required:
    - order_item_id
    - product_id
    - quantity
    type: object
  internal_adapter_http.createReturnRequest:
    properties:
      description:
        type: string
      image_urls:
        items:
          type: string
        type: array
      items:
        items:
          $ref: '#/definitions/internal_adapter_http.createReturnItemRequest'
        type: array
      order_id:
        type: string
      reason:
        type: string
      refund_amount_cents:
        type: integer
      refund_method:
        type: string
      seller_id:
        type: string
    required:
    - items
    - order_id
    - reason
    - seller_id
    type: object
  internal_adapter_http.resolveDisputeRequest:
    properties:
      resolution:
        type: string
      status:
        type: string
    required:
    - resolution
    - status
    type: object
  internal_adapter_http.updateReturnStatusRequest:
    properties:
      status:
        type: string
    required:
    - status
    type: object
host: localhost:28094
