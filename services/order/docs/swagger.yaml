basePath: /api/v1
definitions:
  internal_adapter_http.addressDTO:
    properties:
      city:
        type: string
      country_code:
        type: string
      full_name:
        type: string
      line1:
        type: string
      line2:
        type: string
      phone:
        type: string
      postal_code:
        type: string
      state:
        type: string
    type: object
  internal_adapter_http.createOrderRequest:
    properties:
      buyer_email:
        type: string
      buyer_id:
        type: string
      currency:
        type: string
      items:
        items:
          $ref: '#/definitions/internal_adapter_http.orderItemRequest'
        minItems: 1
        type: array
      shipping_address:
        $ref: '#/definitions/internal_adapter_http.addressDTO'
    required:
    - buyer_id
    - items
    - shipping_address
    type: object
  internal_adapter_http.listResponse:
    properties:
      data: {}
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  internal_adapter_http.orderItemRequest:
    properties:
      image_url:
        type: string
      product_id:
        type: string
      product_name:
        type: string
      quantity:
        minimum: 1
        type: integer
      seller_id:
        type: string
      sku:
        type: string
      unit_price_cents:
        minimum: 1
        type: integer
      variant_id:
        type: string
      variant_name:
        type: string
    required:
    - product_id
    - product_name
    - quantity
    - seller_id
    - unit_price_cents
    type: object
  internal_adapter_http.orderItemResponse:
    properties:
      id:
        type: string
      image_url:
        type: string
      order_id:
        type: string
      product_id:
        type: string
      product_name:
        type: string
      quantity:
        type: integer
      seller_id:
        type: string
      sku:
        type: string
      total_cents:
        type: integer
      unit_price_cents:
        type: integer
      variant_id:
        type: string
      variant_name:
        type: string
    type: object
  internal_adapter_http.orderResponse:
    properties:
      buyer_id:
        type: string
      created_at:
        type: string
      currency:
        type: string
      discount_cents:
        type: integer
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/internal_adapter_http.orderItemResponse'
        type: array
      order_number:
        type: string
      seller_orders:
        items:
          $ref: '#/definitions/internal_adapter_http.sellerOrderResponse'
        type: array
      shipping_address:
        $ref: '#/definitions/internal_adapter_http.addressDTO'
      shipping_cents:
        type: integer
      status:
        type: string
      subtotal_cents:
        type: integer
      tax_cents:
        type: integer
      total_cents:
        type: integer
      updated_at:
        type: string
    type: object
  internal_adapter_http.sellerOrderResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      order_id:
        type: string
      seller_id:
        type: string
      status:
        type: string
      subtotal_cents:
        type: integer
      updated_at:
        type: string
    type: object
  internal_adapter_http.updateStatusRequest:
    properties:
      status:
        type: string
    required:
    - status
    type: object
host: localhost:28083
info:
  contact: {}
  description: Order creation, status tracking, and management for buyers and sellers.
  title: Order Service API
  version: "1.0"
paths:
  /orders:
    get:
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        type: string
      - description: Buyer ID
        in: query
        name: buyer_id
        type: string
      - description: Order status filter
        in: query
        name: status
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_adapter_http.listResponse'
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List orders for a buyer
      tags:
      - Buyer Orders
    post:
      consumes:
      - application/json
      parameters:
      - description: Order creation payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_adapter_http.createOrderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            properties:
              data:
                $ref: '#/definitions/internal_adapter_http.orderResponse'
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Create a new order
      tags:
      - Buyer Orders
  /orders/{id}:
    get:
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                $ref: '#/definitions/internal_adapter_http.orderResponse'
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Get an order by ID
      tags:
      - Buyer Orders
  /orders/{id}/cancel:
    post:
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      - description: Buyer ID
        in: query
        name: buyer_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                $ref: '#/definitions/internal_adapter_http.orderResponse'
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Cancel an order
      tags:
      - Buyer Orders
  /seller/orders:
    get:
      parameters:
      - description: Seller ID
        in: query
        name: seller_id
        required: true
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_adapter_http.listResponse'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: List seller orders
      tags:
      - Seller Orders
  /seller/orders/{id}:
    get:
      parameters:
      - description: Seller Order ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                $ref: '#/definitions/internal_adapter_http.sellerOrderResponse'
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Get a seller order by ID
      tags:
      - Seller Orders
  /seller/orders/{id}/status:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Seller Order ID
        in: path
        name: id
        required: true
        type: string
      - description: New status
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_adapter_http.updateStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                $ref: '#/definitions/internal_adapter_http.sellerOrderResponse'
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Update seller order status
      tags:
      - Seller Orders
securityDefinitions:
  BearerAuth:
    description: JWT Bearer token (via Kong gateway)
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
