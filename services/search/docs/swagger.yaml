basePath: /api/v1
definitions:
  github_com_southern-martin_ecommerce_services_search_internal_domain.SearchIndex:
    properties:
      attributes:
        additionalProperties:
          type: string
        type: object
      categoryID:
        type: string
      createdAt:
        type: string
      currency:
        type: string
      description:
        type: string
      id:
        type: string
      imageURL:
        type: string
      inStock:
        type: boolean
      name:
        type: string
      priceCents:
        format: int64
        type: integer
      productID:
        type: string
      rating:
        format: float64
        type: number
      reviewCount:
        type: integer
      sellerID:
        type: string
      slug:
        type: string
      tags:
        items:
          type: string
        type: array
      updatedAt:
        type: string
    type: object
  internal_adapter_http.IndexProductRequest:
    properties:
      attributes:
        additionalProperties:
          type: string
        type: object
      category_id:
        type: string
      currency:
        type: string
      description:
        type: string
      image_url:
        type: string
      in_stock:
        type: boolean
      name:
        type: string
      price_cents:
