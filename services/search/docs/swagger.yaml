host: localhost:28085
info:
  contact: {}
  description: Full-text product search and autocomplete suggestions.
  title: Search Service API
  version: "1.0"
paths:
  /admin/search/index:
    post:
      consumes:
      - application/json
      description: Add or update a product in the search index.
      parameters:
      - description: Admin user ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Product data to index
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_adapter_http.IndexProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              product_id:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Index a product
      tags:
      - Admin Search Index
  /admin/search/index/{product_id}:
    delete:
      description: Delete a product from the search index.
      parameters:
      - description: Admin user ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Product ID
        in: path
        name: product_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              product_id:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Remove product from index
      tags:
      - Admin Search Index
  /search:
    get:
      description: Full-text search across products with filtering and pagination.
      parameters:
      - description: Search query
        in: query
        name: q
        type: string
      - description: Filter by category
        in: query
        name: category_id
        type: string
      - description: Filter by seller
        in: query
        name: seller_id
        type: string
      - description: Minimum price in cents
        in: query
        name: min_price
        type: integer
      - description: Maximum price in cents
        in: query
        name: max_price
        type: integer
      - description: Filter by stock availability
        in: query
        name: in_stock
        type: boolean
      - description: Sort field
        in: query
        name: sort_by
        type: string
      - description: Sort direction (asc/desc)
        in: query
        name: sort_order
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              page:
                type: integer
              page_size:
                type: integer
              results:
                items:
                  $ref: '#/definitions/github_com_southern-martin_ecommerce_services_search_internal_domain.SearchIndex'
                type: array
              total:
                type: integer
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Search products
      tags:
      - Search
  /search/suggest:
    get:
      description: Returns search suggestions based on a partial query string.
      parameters:
      - description: Search query prefix
        in: query
        name: q
        required: true
        type: string
      - description: Max suggestions (default 10)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              suggestions:
                items:
                  type: string
                type: array
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Autocomplete suggestions
      tags:
      - Search
securityDefinitions:
  BearerAuth:
    description: JWT Bearer token (via Kong gateway)
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
