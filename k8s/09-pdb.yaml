# PodDisruptionBudgets for core services with 2+ replicas
# Ensures at least 1 pod remains available during voluntary disruptions

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-pdb
  namespace: ecommerce
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: auth

---
