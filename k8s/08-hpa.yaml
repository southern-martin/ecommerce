# Horizontal Pod Autoscalers for all ecommerce microservices
# Core services (2+ replicas): min=2, max=10
# Lower-traffic services (1 replica): min=1, max=5
# All target CPU at 70%, memory at 80%

---
# ============================================================
# Core high-traffic services (min=2, max=10)
# ============================================================

# Auth HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-hpa
  namespace: ecommerce
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

