# Production overrides for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requires: .env.production with all secrets defined (see .env.production.example)

x-prod-env: &prod-env
  LOG_LEVEL: info
  ENVIRONMENT: production
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

x-prod-logging: &prod-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

x-prod-healthcheck: &prod-healthcheck
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 30s

x-core-resources: &core-resources
  deploy:
    resources:
      limits:
        memory: 512M
        cpus: "0.50"
      reservations:
        memory: 256M
        cpus: "0.25"

x-support-resources: &support-resources
  deploy:
    resources:
      limits:
        memory: 256M
        cpus: "0.25"
      reservations:
        memory: 128M
        cpus: "0.10"

services:
  # ─────────────────────────────────────────────
  # Infrastructure Services
  # ─────────────────────────────────────────────

  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      <<: *prod-healthcheck
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerce}"]
    <<: *prod-logging

  redis:
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      <<: *prod-healthcheck
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
    <<: *prod-logging

  nats:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    <<: *prod-logging

  elasticsearch:
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    <<: *prod-logging

  minio:
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    <<: *prod-logging

  # Dev-only services: scale to 0 replicas in production
  minio-init:
    deploy:
      replicas: 0

  mailhog:
    deploy:
      replicas: 0

  # ─────────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────────

  kong:
    restart: always
    environment:
      KONG_JWT_SECRET: ${JWT_SECRET}
      KONG_ADMIN_LISTEN: "off"
    <<: [*core-resources, *prod-logging]
    healthcheck:
      <<: *prod-healthcheck
      test: ["CMD", "kong", "health"]

  # ─────────────────────────────────────────────
  # Web Frontend
  # ─────────────────────────────────────────────

  web:
    restart: always
    <<: [*support-resources, *prod-logging]
    healthcheck:
      <<: *prod-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]

  # ─────────────────────────────────────────────
  # Core Services (512MB / 500m CPU)
  # ─────────────────────────────────────────────

  auth:
    restart: always
    environment:
      <<: *prod-env
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis:6379
    <<: [*core-resources, *prod-logging]

  user:
    restart: always
    environment:
      <<: *prod-env
    <<: [*core-resources, *prod-logging]

  product:
    restart: always
    environment:
      <<: *prod-env
    <<: [*core-resources, *prod-logging]

  cart:
    restart: always
    environment:
      <<: *prod-env
      REDIS_URL: redis:6379
    <<: [*core-resources, *prod-logging]

  order:
    restart: always
    environment:
      <<: *prod-env
    <<: [*core-resources, *prod-logging]

  payment:
    restart: always
    environment:
      <<: *prod-env
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    <<: [*core-resources, *prod-logging]

  # ─────────────────────────────────────────────
  # Support Services (256MB / 250m CPU)
  # ─────────────────────────────────────────────

  tax:
    restart: always
    environment:
      <<: *prod-env
    <<: [*support-resources, *prod-logging]

  shipping:
    restart: always
    environment:
      <<: *prod-env
    <<: [*support-resources, *prod-logging]

  return:
    restart: always
    environment:
      <<: *prod-env
    <<: [*support-resources, *prod-logging]

  search:
    restart: always
    environment:
      <<: *prod-env
      ELASTICSEARCH_URL: http://elasticsearch:9200
    <<: [*support-resources, *prod-logging]

  review:
    restart: always
    environment:
      <<: *prod-env
    <<: [*support-resources, *prod-logging]

  media:
    restart: always
    environment:
      <<: *prod-env
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
    <<: [*support-resources, *prod-logging]

  notification:
    restart: always
    environment:
      <<: *prod-env
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    <<: [*support-resources, *prod-logging]

  cms:
    restart: always
    environment:
      <<: *prod-env
    <<: [*support-resources, *prod-logging]

  promotion:
    restart: always
    environment:
      <<: *prod-env
    <<: [*support-resources, *prod-logging]

  loyalty:
    restart: always
    environment:
      <<: *prod-env
    <<: [*support-resources, *prod-logging]

  affiliate:
    restart: always
    environment:
      <<: *prod-env
    <<: [*support-resources, *prod-logging]

  chat:
    restart: always
    environment:
      <<: *prod-env
    <<: [*support-resources, *prod-logging]

  ai:
    restart: always
    environment:
      <<: *prod-env
      AI_PYTHON_SERVICE_URL: ${AI_PYTHON_SERVICE_URL:-http://ai-python:8000}
    <<: [*support-resources, *prod-logging]
