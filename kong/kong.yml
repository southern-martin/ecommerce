  # == Promotion Service =============================================
  - name: promotion-service
    url: http://promotion:8093
    routes:
      - name: promotions-public
        paths: [/api/v1/coupons/validate, /api/v1/flash-sales, /api/v1/bundles]
        methods: [GET]
        strip_path: false

      - name: coupons-apply
        paths: [/api/v1/coupons]
        methods: [POST]
        strip_path: false
        plugins:
          - name: jwt

      - name: seller-coupons
        paths: [/api/v1/seller/coupons]
        strip_path: false
        plugins:
          - name: jwt
          - name: post-function
            config:
              access:
                - |
                  local function extract_and_check()
                    local auth = kong.request.get_header("Authorization")
                    if not auth then return kong.response.exit(403, { message = "Seller or admin access required" }) end
                    local token = auth:match("Bearer%s+(.+)")
                    if not token then return kong.response.exit(403, { message = "Seller or admin access required" }) end
                    local parts = {}
                    for part in token:gmatch("[^%.]+") do table.insert(parts, part) end
                    if #parts < 2 then return kong.response.exit(403, { message = "Seller or admin access required" }) end
                    local payload = parts[2]
                    local rem = #payload % 4
                    if rem > 0 then payload = payload .. string.rep("=", 4 - rem) end
                    payload = payload:gsub("-", "+"):gsub("_", "/")
                    local decoded = ngx.decode_base64(payload)
                    if not decoded then return kong.response.exit(403, { message = "Seller or admin access required" }) end
                    local uid = decoded:match('"user_id"%s*:%s*"([^"]+)"')
                    if not uid then uid = decoded:match('"sub"%s*:%s*"([^"]+)"') or "" end
                    local role = decoded:match('"role"%s*:%s*"([^"]+)"') or ""
                    kong.service.request.set_header("X-User-ID", uid)
                    kong.service.request.set_header("X-User-Role", role)
                    if role ~= "seller" and role ~= "admin" then
                      return kong.response.exit(403, { message = "Seller or admin access required" })
                    end
                  end
                  extract_and_check()

