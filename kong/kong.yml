_format_version: "3.0"

# -----------------------------------------------------------------
# Global Plugins
# -----------------------------------------------------------------

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
        - http://localhost:5173
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Request-ID
        - X-User-ID
        - X-User-Role
      exposed_headers:
        - X-Request-ID
      credentials: true
      max_age: 3600

  - name: rate-limiting
    config:
      minute: 120
      hour: 5000
      policy: local

  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid#counter
      echo_downstream: true

  - name: request-size-limiting
    config:
      allowed_payload_size: 10

  - name: file-log
    config:
      path: /dev/stdout

  # Global JWT claim extraction -> sets X-User-ID + X-User-Role headers.
  # NOTE: This only runs on routes that do NOT have their own post-function.
  # Routes with role-checking post-functions inline their own JWT extraction.
  - name: post-function
    config:
      access:
        - |
          local function extract_jwt_claims()
            local auth = kong.request.get_header("Authorization")
            if not auth then return end
            local token = auth:match("Bearer%s+(.+)")
            if not token then return end
            local parts = {}
            for part in token:gmatch("[^%.]+") do
              table.insert(parts, part)
            end
            if #parts < 2 then return end
            local payload = parts[2]
            local rem = #payload % 4
            if rem > 0 then
              payload = payload .. string.rep("=", 4 - rem)
            end
            payload = payload:gsub("-", "+"):gsub("_", "/")
            local decoded = ngx.decode_base64(payload)
            if not decoded then return end
            local uid = decoded:match('"user_id"%s*:%s*"([^"]+)"')
            if not uid then uid = decoded:match('"sub"%s*:%s*"([^"]+)"') or "" end
            local role = decoded:match('"role"%s*:%s*"([^"]+)"') or ""
            kong.service.request.set_header("X-User-ID", uid)
            kong.service.request.set_header("X-User-Role", role)
          end
          extract_jwt_claims()

# -----------------------------------------------------------------
# Consumers
# -----------------------------------------------------------------

consumers:
  - username: ecommerce-app
    jwt_secrets:
      - key: ecommerce-jwt
        algorithm: HS256
        secret: change-this-to-a-256-bit-secret-in-production

